# cd to ansible directory
# export CLUSTER_NAME=hcp1
# ansible-playbook playbooks/openshift-hcp-cluster-destroy.yaml -i ../ocp-cluster-vars/vars/$CLUSTER_NAME/inventory.yaml -e cluster_name=$CLUSTER_NAME --vault-password-file ./vault-password-file


- name: Load configs
  hosts: all:localhost
  connection: local
  roles:
    - role: common/ansible-config-load
      action: base
  tags:
    - always

- name: Setup Staging Directory
  hosts: localhost
  connection: local
  roles:
    - common/staging-dir-setup
  tags:
    - always

- name: Get Infra cluster credentials
  hosts: localhost
  connection: local
  roles:
    - role: deploy/openshift-credentials-get
      vars:
        cluster: "{{ infra_cluster_fqdn }}"
  tags:
    - always

- name: Load cluster configs
  hosts: localhost:all
  connection: local
  roles:
    - role: common/ansible-config-load
      action: cluster-config
  tags:
    - always

- name: Download Artifacts
  hosts: localhost
  connection: local
  roles:
    - deploy/openshift-download-artifacts
  tags:
    - openshift-download-artifacts
    - pre-deploy

- name: Destroy HCP cluster
  hosts: localhost
  connection: local
  environment:
    KUBECONFIG: "{{ infra_cluster_kubeconfig }}"
  roles:
    - hcp/hcp-cluster-destroy
  tags:
    - hcp-cluster-destroy

