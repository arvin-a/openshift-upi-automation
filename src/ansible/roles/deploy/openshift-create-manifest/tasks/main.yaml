---
- name: remove OCP install folder
  file:
    state: absent
    path: "{{ ocp_install_dir }}"

- name: Create OCP install folder and backup
  file:
    state: directory
    path: "{{ item }}"
  with_items:
    - "{{ ocp_install_dir }}"
    - "{{ staging_backup_dir }}"
    - "{{ staging_dir }}/calico"

- name: Set rendezvous ip for cluster
  set_fact:
    rendezvous_ip: "{{ lookup('dig', groups['control'] | first) }}"

- debug:
    msg:
      - "Rendezvous ip set to {{ rendezvous_ip }} for control node {{ groups['control'] | first }}"

- name: Process OCP install config template
  template: 
    src: install-config.yaml
    dest: "{{ item }}"
  with_items:
    - "{{ ocp_install_dir }}"
    - "{{ staging_backup_dir }}"

- name: Process OCP agent config template
  template: 
    src: agent-config.yaml
    dest: "{{ item }}"
  with_items:
    - "{{ ocp_install_dir }}"
    - "{{ staging_backup_dir }}"

- name: Process disk wipe template
  template: 
    src: 98-worker-disk-wipe.bu
    dest: "{{ staging_dir }}"

- name: Create OCP manifests
  shell: |
    {{ openshift_install_bin }} agent create cluster-manifests --dir {{ ocp_install_dir }}

- name: Create openshift directory under cluster config directory
  file:
    state: directory
    path: "{{ ocp_install_dir }}/openshift"

- name: Setting Jumbo Frames for OVN-Kubernetes
  ansible.builtin.template:
    src: cluster-network-03-config.yaml
    dest: "{{ ocp_install_dir }}/openshift/cluster-network-03-config.yaml"
    mode: "0644"
  when: ocp_network_type == "OVNKubernetes"

- name: Process wipe disk butane template
  shell: |
    {{ butane_bin }} {{ staging_dir }}/98-worker-disk-wipe.bu -o {{ ocp_install_dir }}/openshift/98-worker-disk-wipe.yaml


# Tag based mirror set template for platform registry
- name: Process tag based mirror set template for platform registry
  template: 
    src: platform-registry-itms.yaml
    dest: "{{ ocp_install_dir }}/openshift"
  when: image_content_sources is defined and image_content_sources | length > 0

- name: Download Calico manifests
  ansible.builtin.get_url:
    url: "{{ calico_archive_uri }}"
    dest: "{{ staging_dir }}/calico"
  when: ocp_network_type == "Calico"

- name: Extract Calico manifests
  ansible.builtin.unarchive:
    src: "{{ staging_dir }}/calico/ocp.tgz"
    dest: "{{ staging_dir }}/calico"
    remote_src: yes
  when: ocp_network_type == "Calico"

- name: Copy Calico manifests to OCP openshift directory
  copy:
    src: "{{ staging_dir }}/calico/ocp/"
    dest: "{{ ocp_install_dir }}/openshift/"
  when: ocp_network_type == "Calico"

- name: Set Calico to eBPF mode and update Calico data plane configmap
  template: 
    src: "calico/{{ item}}"
    dest: "{{ ocp_install_dir }}/openshift/"
  when: ocp_network_type == "Calico"
  loop:
    - "03-cr-installation.yaml"
    - "01-configmap-kubernetes-services-endpoint.yaml"
    
