- name: Create RAW image for additional data disk drive
  delegate_to: "{{ groups.hypervisor[0] }}"
  shell: | 
    qemu-img create -f raw {{ disk.path_on_hv_host }}/{{ inventory_hostname }}.img {{ disk.size }}
  when: disk.type == "file"
  become: True
