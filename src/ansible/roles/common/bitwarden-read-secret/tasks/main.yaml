---
- name: Get project ID for '{{ project_name }}' project
  ansible.builtin.command:
    cmd: "{{ bitwarden_secrets_cli }} --access-token {{ bitwarden_token }}  project list"
  register: bw_projects
  changed_when: false
  run_once: true
  no_log: false

- name: Parse '{{ project_name }}' project ID
  ansible.builtin.set_fact:
    project_id: "{{ (bw_projects.stdout | from_json | selectattr('name', 'equalto', project_name) | first).id }}"
  run_once: true
  no_log: false

- name: Get all secrets from Bitwarden
  ansible.builtin.command:
    cmd: "{{ bitwarden_secrets_cli }} --access-token {{ bitwarden_token }} secret list {{ project_id }}"
  register: bw_secrets
  changed_when: false
  run_once: true
  no_log: false

- name: Set bitwarden secrets fact filtered by project
  ansible.builtin.set_fact:
    bitwarden_payload: "{{ (bw_secrets.stdout | from_json) | list }}"
  run_once: true
  no_log: false
...
