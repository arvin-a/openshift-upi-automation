# Stage 3: Delete HostedCluster and wait for control plane teardown
- name: Remove HostedCluster
  k8s:
    state: absent
    definition: "{{ lookup('template', '04-hcp-hosted-cluster.yaml') }}"

- name: Wait for HostedCluster to be fully removed
  shell:
    cmd: "{{ oc_bin }} get hostedcluster -n clusters {{ ocp_cluster_name }}"
  register: hostedcluster_check
  until: hostedcluster_check.rc != 0
  retries: 120
  delay: 10
  failed_when: false

# Stage 4: Clean up secrets
- name: Remove htpasswd secret
  k8s:
    state: absent
    api_version: v1
    kind: Secret
    namespace: clusters
    name: "{{ ocp_cluster_name }}-htpass-secret"
  ignore_errors: true

- name: Remove cluster secrets
  k8s:
    state: absent
    definition: "{{ lookup('template', item) }}"
  loop:
    - "03-hcp-ssh-key-secret.yaml"
    - "02-hcp-pull-secret.yaml"
  ignore_errors: true
