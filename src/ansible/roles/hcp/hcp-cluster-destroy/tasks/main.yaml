---

# Stage 1: Remove ACM resources first while the hosted cluster API is still reachable
- name: Remove KlusterletAddonConfig
  k8s:
    state: absent
    definition: "{{ lookup('template', '07-hcp-klusterlet-addon-config.yaml') }}"
  ignore_errors: true

- name: Remove ManagedCluster
  k8s:
    state: absent
    definition: "{{ lookup('template', '06-hcp-managed-cluster.yaml') }}"
  ignore_errors: true

- name: Wait for ManagedCluster to be fully removed
  shell:
    cmd: "{{ oc_bin }} get managedcluster {{ ocp_cluster_name }}"
  register: managed_cluster_check
  until: managed_cluster_check.rc != 0
  retries: 60
  delay: 10
  failed_when: false

# Stage 2: Delete NodePool and wait for KubeVirt VMs to deprovision
- name: Remove NodePool
  k8s:
    state: absent
    definition: "{{ lookup('template', '05-hcp-node-pool.yaml') }}"


