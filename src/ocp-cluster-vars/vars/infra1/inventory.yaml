hypervisor:
  hosts:
    t640.arvhomelab.com:
      ansible_python_interpreter: '/usr/bin/python3'

webserver:
  hosts:
    webserver.arvhomelab.com:
      ansible_python_interpreter: "/usr/bin/python3"

control:
  hosts:
    control1.infra1.k8s.arvhomelab.com:
      nic1:
        mac_address: '02:00:00:be:30:19'
        vlan: '7'
    control2.infra1.k8s.arvhomelab.com:
      nic1:
        mac_address: '02:00:00:3d:5f:2b'
        vlan: '7'
    control3.infra1.k8s.arvhomelab.com:
      nic1:
        mac_address: '02:00:00:03:ff:8f'
        vlan: '7'
  vars:
    type: 'kvm'
    node_role: 'master'
    cpu: '6'
    memory: '28'
    rhcos_os_disk_size: '100G'
    nic1_name: 'enp1s0'

worker:
  hosts:
    worker1.infra1.k8s.arvhomelab.com:
      type: 'kvm'
      cpu: '22'
      memory: '88'
      rhcos_os_disk_size: '120G'
      nic1:
        name: enp1s0
        mac_address: '02:00:00:a1:13:f3'
        vlan: '7'
      nic2:
        name: enp2s0
        mac_address: '02:00:00:b8:11:df'
        vlan: '8'
      disks:
        - type: 'block'
          speed: 'standard'
          bus: '05'
          path_on_hv_host: '/dev/p4610lvm/p4610-1'
          target_dev: 'vdb'
          path: '/dev/disk/by-path/pci-0000:05:00.0'
          size: '1.2T'
        - type: 'block'
          speed: 'fast'
          bus: '06'
          path_on_hv_host: '/dev/p900lvm/p900-1'
          target_dev: 'vdc'
          path: '/dev/disk/by-path/pci-0000:06:00.0'
          size: '130G'
    worker2.infra1.k8s.arvhomelab.com:
      type: 'kvm'
      cpu: '22'
      memory: '88'
      rhcos_os_disk_size: '120G'
      nic1:
        name: enp1s0
        mac_address: '02:00:00:94:e8:8e'
        vlan: '7'
      nic2:
        name: enp2s0
        mac_address: '02:00:00:83:af:ca'
        vlan: '8'
      disks:
        - type: 'block'
          speed: 'standard'
          bus: '05'
          path_on_hv_host: '/dev/p4610lvm/p4610-2'
          target_dev: 'vdb'
          path: '/dev/disk/by-path/pci-0000:05:00.0'
          size: '1.2T'
        - type: 'block'
          speed: 'fast'
          bus: '06'
          path_on_hv_host: '/dev/p900lvm/p900-2'
          target_dev: 'vdc'
          path: '/dev/disk/by-path/pci-0000:06:00.0'
          size: '130G'
    r730-1.arvhomelab.com:
      type: 'bm'
      virtual_media_uefi_path: "PciRoot(0x0)/Pci(0x1A,0x0)/USB(0x0,0x0)/USB(0x5,0x0)/USB(0x3,0x0)/Unit(0x0)"
      nic1:
        name: eno1
        mac_address: '24:6E:96:0F:8E:40'
      nic2:
        name: eno2
        mac_address: '24:6E:96:0F:8E:42'
      disks:
        - type: 'block'
          speed: 'standard'
          path: '/dev/disk/by-path/pci-0000:85:00.0-nvme-1'
          size: '2.9T'
        - type: 'block'
          speed: 'fast'
          path: '/dev/disk/by-path/pci-0000:03:00.0-nvme-1'
          size: '232G'
  vars:
    node_role: 'worker'


ocp_nodes:
  children:
    control:
    worker:
